<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to JobVista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f0f2f5);
        }

        .center-box {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        .welcome-card {
            background-color: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .welcome-card img {
            width: 60px;
            margin-bottom: 20px;
        }

        .welcome-card h1 {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .welcome-card p {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
        }

        .welcome-card a.btn {
            width: 130px;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .welcome-card a.btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 480px) {
            .welcome-card {
                padding: 30px 20px;
            }

            .welcome-card h1 {
                font-size: 24px;
            }

            .welcome-card p {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="center-box">
        <div class="welcome-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135768.png" alt="JobVista Logo">
            <h1>Welcome to JobVista</h1>
            <p>Your gateway to exciting career opportunities!</p>

            <!-- Important: updated links to API call -->
            <a href="http://localhost:7071/api/frontendpages?page=login" class="btn btn-outline-primary">Login</a>
            <a href="http://localhost:7071/api/frontendpages?page=register" class="btn btn-primary">Register</a>
        </div>
    </div>

</body>

</html>
