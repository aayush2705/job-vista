<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login to JobVista</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f0f2f5);
        }

        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        .login-card {
            background-color: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
        }

        .login-card h4 {
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .btn-primary {
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        .text-center a {
            color: #007bff;
            text-decoration: none;
        }

        .text-center a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <h4>Login to JobVista</h4>

            <!-- Alert Box -->
            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="loginForm">
                <input type="email" class="form-control" name="email" placeholder="Email" required>
                <input type="password" class="form-control" name="password" placeholder="Password" required>

                <!-- Role selection -->
                <select class="form-select" name="role" required>
                    <option value="">Select Role</option>
                    <option value="employer">Employer</option>
                    <option value="employee">Employee</option>
                </select>

                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div class="text-center mt-3">
                <a href="http://localhost:7071/api/frontendpages?page=register">Don't have an account? Register</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);
            const data = {};

            formData.forEach((value, key) => {
                data[key] = value;
            });

            const alertBox = document.getElementById('alertBox');

            try {
                const response = await fetch('http://localhost:7071/api/startProject?page=login&type=api', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.text();

                if (response.status === 200) {
                    // Success Alert
                    alertBox.className = "alert alert-success";
                    alertBox.innerText = result;
                    alertBox.classList.remove('d-none');

                    // ✅ Redirect based on role after a short delay
                    setTimeout(() => {
                        if (data.role.toLowerCase() === "employer") {
                            window.location.href = "http://localhost:7071/api/frontendpages?page=employer";
                        } else if (data.role.toLowerCase() === "employee") {
                            window.location.href = "http://localhost:7071/api/frontendpages?page=employee";
                        }
                    }, 1500); // 1.5 second delay so user sees the success message
                } else {
                    // Error Alert
                    alertBox.className = "alert alert-danger";
                    alertBox.innerText = result;
                    alertBox.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Error:', error);
                alertBox.className = "alert alert-danger";
                alertBox.innerText = 'Error submitting login.';
                alertBox.classList.remove('d-none');
            }
        });
    </script>

</body>

</html>
