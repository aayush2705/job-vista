<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - JobVista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f0f2f5);
        }

        .register-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        .register-card {
            background-color: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
        }

        .register-card h2 {
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .btn-primary {
            border-radius: 10px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        .register-card p {
            margin-top: 15px;
            text-align: center;
        }

        .register-card a {
            color: #007bff;
            text-decoration: none;
        }

        .register-card a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <h2>Create an Account</h2>

            <!-- Alert Box -->
            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="registerForm">
                <input type="text" class="form-control" name="username" placeholder="Username" required />
                <input type="text" class="form-control" name="firstName" placeholder="First Name" required />
                <input type="text" class="form-control" name="lastName" placeholder="Last Name" required />
                <input type="date" class="form-control" name="dob" required />
                <input type="email" class="form-control" name="email" placeholder="Email" required />
                <input type="password" class="form-control" name="password" placeholder="Password" required />

                <!-- Role select -->
                <select class="form-select" name="role" id="role" required>
                    <option value="">Select Role</option>
                    <option value="employer">Employer</option>
                    <option value="employee">Employee</option>
                </select>

                <input type="text" class="form-control" placeholder="Type '1234' to verify" id="captcha" required />

                <button type="submit" class="btn btn-primary mt-2">Register</button>
            </form>

            <p>Already have an account?
                <a href="http://localhost:7071/api/frontendpages?page=login">Login here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const captcha = document.getElementById("captcha").value;
            const form = e.target;
            const formData = new FormData(form);
            const data = {};

            formData.forEach((value, key) => {
                data[key] = value;
            });

            const alertBox = document.getElementById('alertBox');

            if (captcha !== "1234") {
                showAlert('Invalid captcha. Please type "1234".', 'danger');
                return;
            }

            try {
                const response = await fetch('http://localhost:7071/api/startProject?page=register&type=api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.text();

                if (response.status === 201) {
                    showAlert(result, 'success');
                    setTimeout(() => {
                        window.location.href = "http://localhost:7071/api/frontendpages?page=login";
                    }, 2000);
                } else {
                    showAlert(result, 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error during registration.', 'danger');
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.innerText = message;
            alertBox.classList.remove('d-none');
        }
    </script>
</body>

</html>
